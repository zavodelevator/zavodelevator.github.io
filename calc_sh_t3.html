<!doctype html>
<html lang="uk">
  <head>
    <title>Шнековий транспортер — новий калькулятор</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="calc_sh_t.css">
    <link rel="icon" href="https://fonts.gstatic.com/s/i/materialiconsoutlined/home/v6/24px.svg">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <a class="navbar-brand" href="https://agrohelix.com.ua/">Agrohelix</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="https://zavodelevator.github.io/calc_sh_t2.html">Шнековий транспортер</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://zavodelevator.github.io/sclad_sp2.html">Цільнокатана спіраль</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://zavodelevator.github.io/calc_tsh.html">ТШ</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://zavodelevator.github.io/nkz/kalk_nkz.html">НКЗ</a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="container">
      <div class="card">
        <div class="card-header">Транспортер шнековий — новий калькулятор</div>
        <div class="card-body">
          <div class="row">
            <div class="col-sm">
              <div class="card mb-3">
                <img class="card-img-top" src="/img/shnek_trans/sh_t_21_krot.jpg" alt="Транспортер шнековий">
              </div>
              <div class="card_price">
                <div class="card-body">Розшифровка ціни</div>
              </div>
              <div class="card mt-3">
                <div class="card-header">Шнек</div>
                <div class="card-body">
                  <div class="mb-2"><strong>Шнек</strong></div>
                  <div id="screw_repair_text" style="font-size:0.875em;color:#555;"></div>
                  <hr/>
                  <div class="form-row">
                    <div class="form-group col-sm">
                      <label for="spiral_metal" style="font-size:0.875em;">Метал спіралі (грн/кг)</label>
                      <select class="form-control" id="spiral_metal"></select>
                    </div>
                    <div class="form-group col-sm">
                      <label for="pipe_metal" style="font-size:0.875em;">Метал труби (грн/кг)</label>
                      <select class="form-control" id="pipe_metal"></select>
                    </div>
                  </div>
                  <p id="screw_total_price" style="font-size:0.875em;color:#555;"></p>
                </div>
              </div>
            </div>
            <div class="col-sm">
              <div class="form-group">
                <label for="params_trans">Діаметр труби шнека мм.</label>
                <select class="form-control" id="params_trans">
                  <option value="102,4050,4500,2048">102</option>
                  <option value="127,4116,4500,2486">127</option>
                  <option value="159,4512,4500,2914">159</option>
                  <option value="219,7350,4500,4384">219</option>
                  <option value="250,8000,4500,5000">250</option>
                  <option value="300,9000,4500,6000">300</option>
                </select>
                <label for="length_trans">Довжина шнека</label>
                <select class="form-control" id="length_trans">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                  <option value="11">11</option>
                  <option value="12">12</option>
                  <option value="13">13</option>
                  <option value="14">14</option>
                  <option value="15">15</option>
                  <option value="16">16</option>
                  <option value="17">17</option>
                  <option value="18">18</option>
                  <option value="19">19</option>
                  <option value="20">20</option>
                </select>
                <div class="form-check form-switch">
                  <input class="form-check-input radio_boonker" type="checkbox" id="flexSwitchCheckChecked_1">
                  <label class="form-check-label" for="flexSwitchCheckChecked_1">Бункер</label>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input radio_pidstavka" type="checkbox" id="flexSwitchCheckChecked_2">
                  <label class="form-check-label" for="flexSwitchCheckChecked_2">Підставка</label>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input radio_krot" type="checkbox" id="flexSwitchCheckChecked_krot">
                  <label class="form-check-label" for="flexSwitchCheckChecked_krot">Крот</label>
                </div>
                <div class="form-check form-switch">
                  <input class="form-check-input radio_zholob" type="checkbox" id="flexSwitchCheckChecked_zholob">
                  <label class="form-check-label" for="flexSwitchCheckChecked_zholob">Жолоб</label>
                </div>
                <br>
                <h6>Тип Двигуна</h6> <span class="need_engyne" style="float:right;"></span>
                <input class="form-check-input form-check-input_engyne" type="radio" name="engyneRadios" id="exampleRadios1" value="engine" checked>
                <label class="form-check-label" for="exampleRadios1">Двигун</label>
                <input class="form-check-input input_two form-check-input_engyne form-check-input_motor_engyne" type="radio" name="engyneRadios" id="exampleRadios2" value="reductor">
                <label class="form-check-label label_two" for="exampleRadios2">Мотор редуктор</label>
                <select class="form-control" id="engine_params">
                  <option selected value="0,0,0">Без двигуна</option>
                  <option value="1500,1.1,5470">Мотор 1.1 кВт. 1500 об./хв.</option>
                  <option value="1500,1.5,6053">Мотор 1.5 кВт. 1500 об./хв.</option>
                  <option value="1500,2.2,9206">Мотор 2.2 кВт. 1500 об./хв.</option>
                  <option value="1500,3.0,8198">Мотор 3.0 кВт. 1500 об./хв.</option>
                  <option value="1500,4.0,10656">Мотор 4.0 кВт. 1500 об./хв.</option>
                  <option value="1500,5.5,14834">Мотор 5.5 кВт. 1500 об./хв.</option>
                  <option value="1500,7.5,19301">Мотор 7.5 кВт. 1500 об./хв.</option>
                  <option value="1500,11.0,23904">Мотор 11.0 кВт. 1500 об./хв.</option>
                </select>
                <br/>
                <hr/>
                <button type="button" id="calck_price" class="btn btn-dark">Розрахувати</button>
                <br/>
                <div class="table-responsive">
                  <table class="table table-sm table-borderless mb-0">
                    <tbody>
                      <tr>
                        <th class="pl-0 w-25" scope="row"><strong>Ціна</strong></th>
                        <td>
                          <p>
                            <span class="mr-3">
                              <strong><span class="price"></span></strong>
                            </span>
                          </p>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <script src="calc_sh_t3.js"></script>
  </body>
</html>
